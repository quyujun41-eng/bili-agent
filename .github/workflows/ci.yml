name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create dummy config for tests
        run: |
          cat > config.py << 'EOF'
          LLM_PROVIDER = "openai"
          OPENAI_API_KEY = "test-key"
          OPENAI_BASE_URL = ""
          OPENAI_MODEL = "gpt-3.5-turbo"
          CLAUDE_MODEL = "claude-3-haiku-20240307"
          ANTHROPIC_API_KEY = "test-key"
          DB_PATH = ":memory:"
          EOF

      - name: Run tests
        run: pytest tests/ -v --tb=short

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ubuntu
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/ubuntu/my-python-project/bili-agent
            git pull origin main
            docker build -t bili-agent:latest .
            docker stop bili-agent 2>/dev/null || true
            docker rm bili-agent 2>/dev/null || true
            docker run -d \
              --name bili-agent \
              --restart unless-stopped \
              -p 5001:5001 \
              -v /home/ubuntu/my-python-project/bili-agent/chroma_db:/app/chroma_db \
              -v /home/ubuntu/my-python-project/bili-agent/data:/app/data \
              --env-file /home/ubuntu/.env \
              bili-agent:latest
            echo "Deploy done: $(date)"
