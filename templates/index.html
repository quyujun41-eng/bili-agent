<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>B站数据 AI 分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root {
  --sidebar-bg: #111827;
  --sidebar-w: 248px;
  --primary: #6366f1;
  --primary-dark: #4f46e5;
  --primary-light: #e0e7ff;
  --body-bg: #f0f2f8;
  --border: #e5e7eb;
  --text: #111827;
  --muted: #6b7280;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--body-bg);
  height: 100vh;
  display: flex;
  overflow: hidden;
  color: var(--text);
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  background: var(--sidebar-bg);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.logo {
  padding: 20px 16px 14px;
  border-bottom: 1px solid rgba(255,255,255,.06);
}
.logo-icon {
  width: 38px; height: 38px;
  background: linear-gradient(135deg,#6366f1,#8b5cf6);
  border-radius: 11px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; margin-bottom: 10px;
}
.logo h1 { font-size: 14px; font-weight: 700; color: #fff; }
.logo p  { font-size: 11px; color: rgba(255,255,255,.35); margin-top: 2px; }

.nav-section { padding: 14px 10px 4px; }
.nav-label {
  font-size: 10px; font-weight: 600;
  color: rgba(255,255,255,.28);
  text-transform: uppercase; letter-spacing: .08em;
  padding: 0 8px; margin-bottom: 4px;
}
.nav-btn {
  display: flex; align-items: center; gap: 9px;
  width: 100%; padding: 8px 10px;
  background: none; border: none; border-radius: 9px;
  cursor: pointer; color: rgba(255,255,255,.6);
  font-size: 12.5px; text-align: left;
  transition: background .15s, color .15s;
}
.nav-btn:hover { background: rgba(255,255,255,.08); color: #fff; }
.nav-btn .ni {
  width: 26px; height: 26px; border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0;
}

.divider { height: 1px; background: rgba(255,255,255,.06); margin: 6px 14px; }

.agent-panel {
  padding: 12px 18px 18px;
  margin-top: auto;
  border-top: 1px solid rgba(255,255,255,.06);
}
.agent-panel .nav-label { padding: 0; margin-bottom: 8px; }
.agent-row {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 0; font-size: 12px; color: rgba(255,255,255,.5);
}
.dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.dot.sql  { background: #34d399; box-shadow: 0 0 5px #34d39960; }
.dot.rag  { background: #60a5fa; box-shadow: 0 0 5px #60a5fa60; }
.dot.chat { background: #f472b6; box-shadow: 0 0 5px #f472b660; }
.mem-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(99,102,241,.18); border-radius: 6px;
  padding: 3px 8px; font-size: 11px; color: rgba(255,255,255,.7);
  margin-top: 8px;
}
.new-chat-btn {
  width: 100%; margin-top: 10px; padding: 7px;
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1);
  border-radius: 8px; color: rgba(255,255,255,.6); font-size: 12px;
  cursor: pointer; transition: background .15s;
}
.new-chat-btn:hover { background: rgba(255,255,255,.12); color: #fff; }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

.topbar {
  padding: 13px 22px;
  background: #fff;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.topbar-title { font-size: 14px; font-weight: 600; }
.topbar-sub   { font-size: 11px; color: var(--muted); margin-top: 1px; }
.status-pill {
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  background: var(--primary-light);
  border-radius: 20px;
  font-size: 11px; font-weight: 600; color: var(--primary-dark);
}
.status-pill .sdot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--primary);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.3} }

/* ── Chat ── */
.chat-wrap {
  flex: 1; overflow-y: auto;
  padding: 24px 28px;
  display: flex; flex-direction: column; gap: 20px;
}
.chat-wrap::-webkit-scrollbar { width: 4px; }
.chat-wrap::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }

.mrow {
  display: flex; gap: 11px;
  animation: fadeUp .22s ease;
}
@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
.mrow.user { flex-direction: row-reverse; }

.av {
  width: 34px; height: 34px; border-radius: 11px;
  flex-shrink: 0; font-size: 13px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
  color: #fff;
}
.av.bot  { background: linear-gradient(135deg,#6366f1,#8b5cf6); }
.av.user { background: linear-gradient(135deg,#f59e0b,#ef4444); }

.mbody { flex: 1; min-width: 0; max-width: 84%; }
.mrow.user .mbody { align-items: flex-end; display: flex; flex-direction: column; }
.mname { font-size: 11px; color: var(--muted); font-weight: 500; margin-bottom: 5px; }

.ububble {
  background: linear-gradient(135deg,#6366f1,#7c3aed);
  color: #fff;
  padding: 11px 16px;
  border-radius: 18px 4px 18px 18px;
  font-size: 14px; line-height: 1.6;
  display: inline-block; max-width: 100%;
  box-shadow: 0 4px 14px rgba(99,102,241,.3);
}

.bcard {
  background: #fff;
  border: 1px solid var(--border);
  padding: 16px 18px;
  border-radius: 4px 16px 16px 16px;
  font-size: 14px; line-height: 1.75;
  box-shadow: 0 2px 12px rgba(0,0,0,.05);
  width: 100%;
}

.thinking-card {
  background: #fff;
  border: 1px solid var(--border);
  padding: 13px 16px;
  border-radius: 4px 16px 16px 16px;
  display: flex; align-items: center; gap: 10px;
  font-size: 13px; color: var(--muted);
  box-shadow: 0 2px 12px rgba(0,0,0,.05);
}
.tdots { display: flex; gap: 4px; }
.tdots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--primary);
  animation: tdot 1.2s ease infinite;
}
.tdots span:nth-child(2) { animation-delay: .2s; }
.tdots span:nth-child(3) { animation-delay: .4s; }
@keyframes tdot {
  0%,80%,100% { transform:scale(.5); opacity:.4; }
  40%         { transform:scale(1);  opacity:1; }
}

.abadge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 600; margin-bottom: 9px;
}
.abadge.sql  { background:#d1fae5; color:#065f46; }
.abadge.rag  { background:#dbeafe; color:#1e40af; }
.abadge.chat { background:#fce7f3; color:#9d174d; }

.sql-wrap { margin-top: 12px; }
.sql-lbl {
  font-size: 10px; font-weight: 600;
  color: #888; text-transform: uppercase;
  letter-spacing: .08em; margin-bottom: 5px;
}
.sql-code {
  background: #1e1e2e; color: #a6e3a1;
  font-family: 'Fira Code','Cascadia Code',monospace;
  font-size: 12px; padding: 13px 15px; border-radius: 10px;
  white-space: pre-wrap; word-break: break-all;
  border: 1px solid #313244;
}

.chart-wrap {
  margin-top: 14px;
  background: #fafbff; border-radius: 12px;
  padding: 10px; border: 1px solid var(--border);
}
.chart-area { width: 100%; height: 280px; }

.tbl-wrap {
  margin-top: 12px; border-radius: 12px;
  overflow: hidden; border: 1px solid var(--border);
}
.tbl-wrap table { border-collapse: collapse; width: 100%; font-size: 12px; }
.tbl-wrap th {
  background: #6366f1; color: #fff;
  padding: 9px 12px; text-align: left;
  font-weight: 600; white-space: nowrap;
}
.tbl-wrap td { padding: 8px 12px; border-bottom: 1px solid #f3f4f6; }
.tbl-wrap tr:last-child td { border-bottom: none; }
.tbl-wrap tr:nth-child(even) td { background: #f9fafb; }
.tbl-wrap tr:hover td { background: #ede9fe; }
.tbl-foot {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; background: #f9fafb;
  border-top: 1px solid var(--border);
}
.tbl-hint { font-size: 11px; color: var(--muted); }
.btn-csv {
  padding: 4px 14px; font-size: 11px; font-weight: 600;
  border: 1.5px solid var(--primary); color: var(--primary);
  background: #fff; border-radius: 20px;
  cursor: pointer; transition: all .15s;
}
.btn-csv:hover { background: var(--primary); color: #fff; }

/* Markdown */
.md-body { font-size: 14px; line-height: 1.8; }
.md-body h1,.md-body h2,.md-body h3 { margin: 10px 0 5px; color: #1e1e2e; }
.md-body h1 { font-size: 16px; }
.md-body h2 { font-size: 15px; }
.md-body h3 { font-size: 14px; }
.md-body strong { color: #4f46e5; }
.md-body p { margin: 4px 0; }
.md-body ul,.md-body ol { padding-left: 20px; margin: 5px 0; }
.md-body li { margin: 2px 0; }
.md-body table { border-collapse: collapse; width: 100%; margin: 8px 0; font-size: 12px; border-radius: 8px; overflow: hidden; }
.md-body th { background: #6366f1; color: #fff; padding: 7px 10px; text-align: left; }
.md-body td { padding: 6px 10px; border-bottom: 1px solid #f0f0f0; }
.md-body tr:nth-child(even) td { background: #f9fafb; }
.md-body code { background: #ede9fe; color: #5b21b6; padding: 1px 6px; border-radius: 4px; font-size: 12px; }
.md-body pre  { background: #1e1e2e; color: #a6e3a1; padding: 12px 14px; border-radius: 8px; font-size: 12px; overflow-x: auto; margin: 8px 0; }
.md-body pre code { background: none; color: inherit; padding: 0; }
.md-body blockquote { border-left: 3px solid #6366f1; padding-left: 12px; color: #6b7280; margin: 8px 0; font-style: italic; }

/* Welcome */
.welcome {
  display: flex; flex-direction: column; align-items: center;
  padding: 48px 20px; text-align: center; color: var(--muted);
}
.welcome .wicon { font-size: 52px; margin-bottom: 14px; }
.welcome h2 { font-size: 20px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.welcome p  { font-size: 14px; max-width: 340px; }

/* Input */
.input-area {
  padding: 14px 22px 18px;
  background: #fff;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.input-inner {
  display: flex; gap: 10px; align-items: center;
  background: #f3f4f8; border-radius: 14px;
  padding: 8px 8px 8px 16px;
  border: 2px solid transparent;
  transition: border-color .2s, background .2s;
}
.input-inner:focus-within { border-color: var(--primary); background: #fff; }
.input-inner input {
  flex: 1; border: none; background: transparent;
  font-size: 14px; color: var(--text); outline: none; padding: 4px 0;
}
.input-inner input::placeholder { color: #9ca3af; }
.send-btn {
  width: 38px; height: 38px;
  background: var(--primary); border: none; border-radius: 11px;
  cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: background .15s, transform .1s;
}
.send-btn:hover:not(:disabled) { background: var(--primary-dark); transform: scale(1.06); }
.send-btn:disabled { background: #d1d5db; cursor: default; }
.send-btn svg { width: 15px; height: 15px; }

@media (max-width: 700px) {
  .sidebar { display: none; }
  .chat-wrap { padding: 14px; }
  .input-area { padding: 10px 14px 14px; }
  .mbody { max-width: 92%; }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">🎬</div>
    <h1>B站 AI 数据分析</h1>
    <p><span id="video-count">--</span> 条视频 · 多 Agent 架构</p>
  </div>

  <div class="nav-section">
    <div class="nav-label">数据查询</div>
    <button class="nav-btn" onclick="ask('播放量最高的10个视频是哪些？')">
      <span class="ni" style="background:#1d2d3e">🏆</span>播放量 Top 10
    </button>
    <button class="nav-btn" onclick="ask('各分区平均播放量是多少？')">
      <span class="ni" style="background:#1d3d2e">📊</span>各分区平均播放量
    </button>
    <button class="nav-btn" onclick="ask('2026年和2025年各分区平均播放量对比')">
      <span class="ni" style="background:#2d1d3e">📅</span>年份对比分析
    </button>
    <button class="nav-btn" onclick="ask('哪个UP主发布的视频最多？')">
      <span class="ni" style="background:#3d2d1e">👤</span>UP 主排行
    </button>
    <button class="nav-btn" onclick="ask('点赞超过10万的视频有多少条？')">
      <span class="ni" style="background:#3d1e1e">❤️</span>高点赞视频
    </button>
  </div>

  <div class="divider"></div>

  <div class="nav-section">
    <div class="nav-label">语义搜索</div>
    <button class="nav-btn" onclick="ask('推荐一些搞笑有趣的视频')">
      <span class="ni" style="background:#1e3030">😄</span>推荐搞笑视频
    </button>
    <button class="nav-btn" onclick="ask('有哪些关于人工智能的视频？')">
      <span class="ni" style="background:#1e2030">🤖</span>AI 相关视频
    </button>
  </div>

  <div class="agent-panel">
    <div class="nav-label">Agent 状态</div>
    <div class="agent-row"><span class="dot sql"></span>SQL 数据查询</div>
    <div class="agent-row"><span class="dot rag"></span>RAG 语义搜索</div>
    <div class="agent-row"><span class="dot chat"></span>对话分析</div>
    <div class="mem-badge" id="memBadge"><span>&#x1F9E0;</span><span id="memTurns">记忆：0 轮</span></div>
    <button class="new-chat-btn" onclick="newChat()">+ 新对话</button>
  </div>
</aside>

<!-- MAIN -->
<main class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">B站数据 AI 分析助手</div>
      <div class="topbar-sub">多 Agent 协作 · LangGraph 路由 · 混合检索 RAG · 对话记忆</div>
    </div>
    <div class="status-pill"><span class="sdot"></span>在线运行中</div>
  </div>

  <div class="chat-wrap" id="chatBox">
    <div class="welcome">
      <div class="wicon">✨</div>
      <h2>你好，我是 B站数据 AI 助手</h2>
      <p>支持数据查询、语义搜索、趋势分析。可以点击左侧快捷按钮，或直接输入问题。</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-inner">
      <input id="inputQ" type="text"
             placeholder="输入问题，例如：哪个分区视频平均时长最长？"
             onkeydown="if(event.key==='Enter')sendQ()"/>
      <button class="send-btn" id="sendBtn" onclick="sendQ()">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"
             stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>
</main>

<script>
var chartInstances = {};
var sessionId = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));

function newChat() {
  sessionId = (crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2));
  document.getElementById('memTurns').textContent = '记忆：0 轮';
  fetch('/api/session/clear', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({session_id: sessionId})});
  var box = document.getElementById('chatBox');
  box.innerHTML = '<div class="welcome"><div class="wicon">&#x2728;</div><div class="wtitle">新对话已开始</div><div class="wsub">历史记忆已清空</div></div>';
}

function ask(q) {
  document.getElementById('inputQ').value = q;
  sendQ();
}

function sendQ() {
  var input = document.getElementById('inputQ');
  var q = input.value.trim();
  if (!q) return;
  input.value = '';

  var btn = document.getElementById('sendBtn');
  btn.disabled = true;

  appendUserMsg(q);

  var thinkId     = 'tk_' + Date.now();
  appendThinking(thinkId);

  var answerText  = '';
  var bubbleId    = 'bb_' + Date.now();
  var bubbleReady = false;
  var agentType   = null;

  function ensureBubble() {
    if (!bubbleReady) {
      var el = document.getElementById(thinkId);
      if (el) el.closest('.mrow').remove();
      appendBotCard(bubbleId, agentType);
      bubbleReady = true;
    }
  }

  fetch('/api/ask', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({question: q, session_id: sessionId})
  }).then(function(resp) {
    var reader  = resp.body.getReader();
    var decoder = new TextDecoder();
    var buf = '';

    function read() {
      reader.read().then(function(r) {
        if (r.done) { btn.disabled = false; return; }
        buf += decoder.decode(r.value, {stream: true});
        var parts = buf.split('\n\n');
        buf = parts.pop();
        parts.forEach(function(part) {
          if (!part.startsWith('data: ')) return;
          try {
            var chunk = JSON.parse(part.slice(6));
            if (chunk.type === 'agent') {
              agentType = chunk.agent;
            } else if (chunk.type === 'text') {
              ensureBubble();
              answerText += chunk.text;
              var b = document.getElementById(bubbleId);
              if (b) {
                b.querySelector('.answer-text').innerHTML =
                  '<div class="md-body">' + marked.parse(answerText) + '</div>';
                scrollBottom();
              }
            } else if (chunk.type === 'memory') {
              var t = chunk.turns || 0;
              document.getElementById('memTurns').textContent = '记忆：' + t + ' 轮';
            } else if (chunk.type === 'done') {
              ensureBubble();
              renderFinal(bubbleId, answerText, chunk);
              btn.disabled = false;
            } else if (chunk.type === 'error') {
              var el = document.getElementById(thinkId);
              if (el) el.closest('.mrow').remove();
              appendError(chunk.error);
              btn.disabled = false;
            }
          } catch(e) {}
        });
        read();
      });
    }
    read();
  }).catch(function() {
    var el = document.getElementById(thinkId);
    if (el) el.closest('.mrow').remove();
    appendError('网络请求失败，请重试');
    btn.disabled = false;
  });
}

function scrollBottom() {
  var box = document.getElementById('chatBox');
  box.scrollTop = box.scrollHeight;
}

function appendUserMsg(q) {
  var box = document.getElementById('chatBox');
  var d = document.createElement('div');
  d.className = 'mrow user';
  d.innerHTML =
    '<div class="av user">你</div>' +
    '<div class="mbody">' +
      '<div class="mname">你</div>' +
      '<div class="ububble">' + escHtml(q) + '</div>' +
    '</div>';
  box.appendChild(d); scrollBottom();
}

function appendThinking(id) {
  var box = document.getElementById('chatBox');
  var d = document.createElement('div');
  d.className = 'mrow';
  d.innerHTML =
    '<div class="av bot">AI</div>' +
    '<div class="mbody">' +
      '<div class="mname">AI 助手</div>' +
      '<div class="thinking-card" id="' + id + '">' +
        '<div class="tdots"><span></span><span></span><span></span></div>' +
        'AI 正在思考...' +
      '</div>' +
    '</div>';
  box.appendChild(d); scrollBottom();
}

function appendBotCard(id, agent) {
  var badgeHtml = '';
  if      (agent === 'sql_agent')  badgeHtml = '<div class="abadge sql">⚡ SQL 查询</div>';
  else if (agent === 'rag_agent')  badgeHtml = '<div class="abadge rag">🔍 RAG 搜索</div>';
  else if (agent === 'chat_agent') badgeHtml = '<div class="abadge chat">💬 对话</div>';

  var box = document.getElementById('chatBox');
  var d = document.createElement('div');
  d.className = 'mrow';
  d.innerHTML =
    '<div class="av bot">AI</div>' +
    '<div class="mbody">' +
      '<div class="mname">AI 助手</div>' +
      '<div class="bcard" id="' + id + '">' +
        badgeHtml +
        '<div class="answer-text"></div>' +
      '</div>' +
    '</div>';
  box.appendChild(d); scrollBottom();
}

function appendError(msg) {
  var box = document.getElementById('chatBox');
  var d = document.createElement('div');
  d.className = 'mrow';
  d.innerHTML =
    '<div class="av bot">AI</div>' +
    '<div class="mbody">' +
      '<div class="mname">AI 助手</div>' +
      '<div class="bcard" style="color:#ef4444">' + escHtml(msg) + '</div>' +
    '</div>';
  box.appendChild(d); scrollBottom();
}

function renderFinal(bubbleId, answerText, data) {
  var chartId = 'ec_' + Date.now();
  var b = document.getElementById(bubbleId);
  if (!b) return;

  var badge = b.querySelector('.abadge');
  var badgeHtml = badge ? badge.outerHTML : '';

  var html = badgeHtml;
  html += '<div class="md-body">' + marked.parse(answerText) + '</div>';

  if (data.sql) {
    html += '<div class="sql-wrap">' +
      '<div class="sql-lbl">执行的 SQL</div>' +
      '<div class="sql-code">' + escHtml(data.sql) + '</div>' +
      '</div>';
  }

  if (data.chart && data.chart.should_chart) {
    html += '<div class="chart-wrap"><div class="chart-area" id="' + chartId + '"></div></div>';
  }

  if (data.rows && data.rows.length > 0) {
    html += '<div class="tbl-wrap"><div style="overflow-x:auto"><table><thead><tr>';
    data.columns.forEach(function(c) {
      html += '<th>' + escHtml(String(c)) + '</th>';
    });
    html += '</tr></thead><tbody>';
    data.rows.forEach(function(row) {
      html += '<tr>';
      row.forEach(function(cell) {
        html += '<td>' + escHtml(cell === null ? '-' : String(cell)) + '</td>';
      });
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    var hint = data.total > data.rows.length
      ? '共 ' + data.total + ' 条，显示前 ' + data.rows.length + ' 条'
      : '共 ' + data.total + ' 条';
    html += '<div class="tbl-foot">' +
      '<span class="tbl-hint">' + hint + '</span>' +
      '<button class="btn-csv" onclick="downloadCSV(this)">↓ 下载 CSV</button>' +
      '</div></div>';
  }

  b.innerHTML = html;
  scrollBottom();

  if (data.chart && data.chart.should_chart && data.chart.option) {
    setTimeout(function() {
      var el = document.getElementById(chartId);
      if (el) {
        var c = echarts.init(el);
        c.setOption(data.chart.option);
        chartInstances[chartId] = c;
      }
    }, 60);
  }
}

function downloadCSV(btn) {
  var table = btn.closest('.tbl-wrap').querySelector('table');
  if (!table) return;
  var csv = Array.from(table.querySelectorAll('tr')).map(function(row) {
    return Array.from(row.querySelectorAll('th,td')).map(function(cell) {
      return '"' + cell.textContent.replace(/"/g,'""') + '"';
    }).join(',');
  }).join('\n');
  var blob = new Blob(['﻿' + csv], {type:'text/csv;charset=utf-8'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'bili_data.csv'; a.click();
  URL.revokeObjectURL(url);
}

window.addEventListener('resize', function() {
  Object.values(chartInstances).forEach(function(c) { if(c) c.resize(); });
});

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>

<script>
fetch('/api/db/count').then(r=>r.json()).then(d=>{
  const el = document.getElementById('video-count');
  if(el) el.textContent = d.count.toLocaleString();
});
</script>
