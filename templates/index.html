<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>B站数据 AI 分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #f4f6fb; min-height: 100vh; }
.header { background: #4a90e2; color: #fff; padding: 16px 24px; font-size: 18px; font-weight: bold; }
.header span { font-size: 13px; font-weight: normal; opacity: .7; margin-left: 12px; }
.container { max-width: 860px; margin: 0 auto; padding: 24px 16px; }

.chat-box { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08);
            min-height: 420px; max-height: 62vh; overflow-y: auto; padding: 20px; margin-bottom: 16px; }

.msg { margin-bottom: 20px; }
.msg.user { text-align: right; }
.msg.user .bubble { background: #4a90e2; color: #fff; display: inline-block; padding: 10px 16px;
                    border-radius: 18px 18px 4px 18px; max-width: 80%; text-align: left; }
.msg.bot .bubble { background: #f0f4ff; color: #333; display: inline-block; padding: 10px 16px;
                   border-radius: 18px 18px 18px 4px; max-width: 90%; text-align: left; }
.msg .label { font-size: 12px; color: #aaa; margin-bottom: 4px; }

.sql-block { background: #1e1e2e; color: #a6e3a1; font-family: monospace; font-size: 12px;
             padding: 10px 14px; border-radius: 6px; margin-top: 10px; white-space: pre-wrap; word-break: break-all; }
.chart-area { margin-top: 14px; width: 100%; height: 300px; }

.table-wrap { margin-top: 10px; overflow-x: auto; }
table { border-collapse: collapse; font-size: 12px; width: 100%; }
th { background: #4a90e2; color: #fff; padding: 6px 10px; text-align: left; }
td { padding: 5px 10px; border-bottom: 1px solid #f0f0f0; }
tr:nth-child(even) td { background: #f8f9ff; }

.total-hint { font-size: 12px; color: #aaa; margin-top: 6px; }

.btn-row { margin-top: 8px; display: flex; gap: 8px; flex-wrap: wrap; }
.btn-csv { padding: 4px 12px; font-size: 12px; border: 1px solid #4a90e2; color: #4a90e2;
           background: #fff; border-radius: 12px; cursor: pointer; transition: all .15s; }
.btn-csv:hover { background: #4a90e2; color: #fff; }

.input-row { display: flex; gap: 10px; }
.input-row input { flex: 1; padding: 12px 16px; border: 1.5px solid #d0d8f0; border-radius: 24px;
                   font-size: 15px; outline: none; transition: border .2s; min-width: 0; }
.input-row input:focus { border-color: #4a90e2; }
.input-row button { padding: 12px 24px; background: #4a90e2; color: #fff; border: none;
                    border-radius: 24px; font-size: 15px; cursor: pointer; font-weight: bold;
                    transition: background .2s; white-space: nowrap; flex-shrink: 0; }
.input-row button:disabled { background: #b0c8f0; cursor: default; }
.input-row button:hover:not(:disabled) { background: #357abd; }

.suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 14px; }
.suggestions button { padding: 6px 14px; border: 1.5px solid #4a90e2; color: #4a90e2; background: #fff;
                      border-radius: 16px; font-size: 13px; cursor: pointer; transition: all .15s; }
.suggestions button:hover { background: #4a90e2; color: #fff; }

.thinking { color: #aaa; font-size: 13px; padding: 8px 0; }
.thinking::after { content: ''; animation: dots 1.2s infinite; }
@keyframes dots { 0%,20%{content:'.'} 40%{content:'..'} 60%,100%{content:'...'} }

/* 移动端适配 */
@media (max-width: 600px) {
    .header { padding: 12px 16px; font-size: 15px; }
    .header span { display: none; }
    .container { padding: 12px 8px; }
    .chat-box { min-height: 280px; max-height: 58vh; padding: 12px; }
    .msg.bot .bubble, .msg.user .bubble { max-width: 95%; }
    .suggestions button { font-size: 12px; padding: 5px 10px; }
    .input-row input { font-size: 13px; padding: 10px 12px; }
    .input-row button { padding: 10px 16px; font-size: 13px; }
    table { font-size: 11px; }
    th, td { padding: 4px 6px; }
    .chart-area { height: 220px; }
}
</style>
</head>
<body>
<div class="header">
    B站数据 AI 分析助手
    <span>基于双 Agent 架构 · 自动生成 SQL · 智能可视化</span>
</div>
<div class="container">
    <div class="suggestions">
        <button onclick="ask('播放量最高的10个视频是哪些？')">播放量 Top10</button>
        <button onclick="ask('各分区平均播放量是多少？')">各分区平均播放量</button>
        <button onclick="ask('2026年和2025年各分区平均播放量对比')">年份对比</button>
        <button onclick="ask('哪个UP主发布的视频最多？')">UP主排行</button>
        <button onclick="ask('点赞超过10万的视频有多少条？')">高点赞视频</button>
    </div>

    <div class="chat-box" id="chatBox">
        <div class="msg bot">
            <div class="label">AI 助手</div>
            <div class="bubble">你好！我可以帮你分析B站视频数据。可以直接点上方快捷问题，或者自己输入任何问题。</div>
        </div>
    </div>

    <div class="input-row">
        <input id="inputQ" type="text" placeholder="输入问题，如：哪个分区视频平均时长最长？" onkeydown="if(event.key==='Enter')sendQ()"/>
        <button id="sendBtn" onclick="sendQ()">发送</button>
    </div>
</div>

<script>
var chartInstances = {};
var chatHistory = [];

function ask(q) {
    document.getElementById('inputQ').value = q;
    sendQ();
}

function sendQ() {
    var input = document.getElementById('inputQ');
    var q = input.value.trim();
    if (!q) return;
    input.value = '';

    var btn = document.getElementById('sendBtn');
    btn.disabled = true;

    appendMsg('user', '<div class="bubble">' + escHtml(q) + '</div>');

    var thinkId = 'think_' + Date.now();
    appendMsg('bot', '<div class="bubble thinking" id="' + thinkId + '">AI 正在思考</div>');

    var answerText = '';
    var bubbleId = 'bubble_' + Date.now();
    var bubbleCreated = false;

    function ensureBubble() {
        if (!bubbleCreated) {
            var el = document.getElementById(thinkId);
            if (el) el.parentElement.remove();
            appendMsg('bot', '<div class="bubble" id="' + bubbleId + '"><div class="answer-text"></div></div>');
            bubbleCreated = true;
        }
    }

    fetch('/api/ask', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({question: q, history: chatHistory})
    }).then(function(resp) {
        var reader = resp.body.getReader();
        var decoder = new TextDecoder();
        var buf = '';

        function read() {
            reader.read().then(function(result) {
                if (result.done) { btn.disabled = false; return; }
                buf += decoder.decode(result.value, {stream: true});
                var parts = buf.split('\n\n');
                buf = parts.pop();
                parts.forEach(function(part) {
                    if (!part.startsWith('data: ')) return;
                    try {
                        var chunk = JSON.parse(part.slice(6));
                        if (chunk.type === 'text') {
                            ensureBubble();
                            answerText += chunk.text;
                            var b = document.getElementById(bubbleId);
                            if (b) {
                                b.querySelector('.answer-text').innerHTML =
                                    '<div style="font-size:15px;line-height:1.7;">' + escHtml(answerText) + '</div>';
                                document.getElementById('chatBox').scrollTop = 9999;
                            }
                        } else if (chunk.type === 'done') {
                            ensureBubble();
                            renderFinal(bubbleId, answerText, chunk);
                            chatHistory.push({role: 'user', content: q});
                            chatHistory.push({role: 'assistant', content: answerText});
                            btn.disabled = false;
                        } else if (chunk.type === 'error') {
                            var el = document.getElementById(thinkId);
                            if (el) el.parentElement.remove();
                            appendMsg('bot', '<div class="bubble" style="color:#e85d5d;">' + escHtml(chunk.error) + '</div>');
                            btn.disabled = false;
                        }
                    } catch(e) {}
                });
                read();
            });
        }
        read();
    }).catch(function() {
        var el = document.getElementById(thinkId);
        if (el) el.parentElement.remove();
        appendMsg('bot', '<div class="bubble" style="color:#e85d5d;">请求失败，请重试</div>');
        btn.disabled = false;
    });
}

function renderFinal(bubbleId, answerText, data) {
    var chartId = 'chart_' + Date.now();
    var b = document.getElementById(bubbleId);
    if (!b) return;
    var html = '<div style="font-size:15px;line-height:1.7;">' + escHtml(answerText) + '</div>';
    if (data.sql) html += '<div class="sql-block">' + escHtml(data.sql) + '</div>';
    if (data.chart && data.chart.should_chart) html += '<div class="chart-area" id="' + chartId + '"></div>';
    if (data.rows && data.rows.length > 0) {
        html += '<div class="table-wrap"><table><thead><tr>';
        data.columns.forEach(function(c) { html += '<th>' + escHtml(String(c)) + '</th>'; });
        html += '</tr></thead><tbody>';
        data.rows.forEach(function(row) {
            html += '<tr>';
            row.forEach(function(cell) { html += '<td>' + escHtml(cell === null ? '-' : String(cell)) + '</td>'; });
            html += '</tr>';
        });
        html += '</tbody></table></div>';
        if (data.total > data.rows.length)
            html += '<div class="total-hint">共 ' + data.total + ' 条，显示前 ' + data.rows.length + ' 条</div>';
        // CSV 下载按钮
        html += '<div class="btn-row"><button class="btn-csv" onclick="downloadCSV(this)">下载 CSV</button></div>';
    }
    b.innerHTML = html;
    document.getElementById('chatBox').scrollTop = 9999;
    if (data.chart && data.chart.should_chart && data.chart.option) {
        setTimeout(function() {
            var el = document.getElementById(chartId);
            if (el) {
                var c = echarts.init(el);
                c.setOption(data.chart.option);
                chartInstances[chartId] = c;
            }
        }, 50);
    }
}

function downloadCSV(btn) {
    var table = btn.closest('.bubble').querySelector('table');
    if (!table) return;
    var csv = Array.from(table.querySelectorAll('tr')).map(function(row) {
        return Array.from(row.querySelectorAll('th,td')).map(function(cell) {
            return '"' + cell.textContent.replace(/"/g, '""') + '"';
        }).join(',');
    }).join('\n');
    var blob = new Blob(['﻿' + csv], {type: 'text/csv;charset=utf-8'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url; a.download = 'bili_data.csv'; a.click();
    URL.revokeObjectURL(url);
}

function appendMsg(role, content) {
    var box = document.getElementById('chatBox');
    var div = document.createElement('div');
    div.className = 'msg ' + role;
    div.innerHTML = '<div class="label">' + (role === 'user' ? '你' : 'AI 助手') + '</div>' + content;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
}

function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
